<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>光華隊 バトル市場ダッシュボード</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0b09;--card:#151310;--border:#2a2820;--gold:#d4a44a;--text:#e0ddd4;--sub:#8a8778;--win:#4a9;--lose:#c66;--blue:#6a8ac0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:0}
.header{background:linear-gradient(135deg,#1a1510,#0c0b09);border-bottom:1px solid var(--border);padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;color:var(--gold);font-weight:700;letter-spacing:1px}
.header .sub{font-size:13px;color:var(--sub);margin-top:4px}
.header .status{font-size:12px;padding:4px 10px;border-radius:4px}
.status.ok{background:#1a2e1a;color:#8ae08a}
.status.wait{background:#2e2a1a;color:#e0c060}
.status.err{background:#2e1a1a;color:#e08a8a}

.drop-area{margin:12px 24px;border:2px dashed var(--border);border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;font-size:13px;color:var(--sub)}
.drop-area:hover,.drop-area.drag{border-color:var(--gold);background:rgba(212,164,74,0.05)}
.drop-area.loaded{padding:8px;border-style:solid;border-color:var(--border)}

.tabs{display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

.content{padding:16px 24px}
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{text-align:left;font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border)}
.rank-table td{padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(42,40,32,0.5);cursor:pointer;transition:background .1s}
.rank-table tr:hover td{background:rgba(212,164,74,0.05)}
.bar{display:inline-block;height:16px;border-radius:2px;vertical-align:middle;min-width:2px}
.bar-win{background:var(--win)}
.kw-name{color:var(--text);font-weight:500}
.num{font-variant-numeric:tabular-nums;text-align:right}

.compare-area{display:none}.compare-area.show{display:block}
.compare-title{font-size:16px;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.compare-title .back{font-size:12px;color:var(--sub);cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:4px}
.compare-title .back:hover{border-color:var(--gold);color:var(--gold)}
.split{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.split{grid-template-columns:1fr}}
.col-label{font-size:13px;font-weight:600;padding:6px 10px;border-radius:4px;margin-bottom:10px}
.col-label.win{background:#1a2e1a;color:#8ae08a}
.col-label.lose{background:#2e1a1a;color:#e08a8a}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:500px){.vgrid{grid-template-columns:1fr}}
.vcard{text-decoration:none;color:inherit;display:block;background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--border);transition:all .15s}
.vcard:hover{border-color:#5a5840;transform:translateY(-2px)}
.vcard .thumb{aspect-ratio:16/9;background:#000;overflow:hidden}
.vcard .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.vcard .views{padding:5px 8px 0;font-size:14px;font-weight:700;color:var(--gold)}
.vcard .vtitle{padding:2px 8px;font-size:11px;line-height:1.3;height:42px;overflow:hidden;color:#c0bdb4}
.vcard .vch{padding:0 8px 6px;font-size:10px;color:var(--sub)}
.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;min-width:80px}
.stat-box .label{font-size:10px;color:var(--sub);margin-bottom:2px}
.stat-box .value{font-size:16px;font-weight:700;color:var(--gold)}
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>光華隊 バトル市場ダッシュボード</h1>
    <div class="sub" id="dateLine">読み込み中...</div>
  </div>
  <div class="status wait" id="statusBadge">待機中</div>
</div>

<div class="drop-area" id="dropArea" onclick="document.getElementById('fileIn').click()">
  CSVをドロップで手動読み込み（自動取得に失敗した場合のバックアップ）
  <input type="file" id="fileIn" accept=".csv" style="display:none">
</div>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" data-tab="ranking">打率ランキング</div>
  <div class="tab" data-tab="compare">勝ち負け比較</div>
</div>

<div class="content" id="rankingView" style="display:none"></div>
<div class="content compare-area" id="compareView"></div>

<script>
let allData = {};

// ===== GitHub Pages auto-fetch =====
// yt_data/battle_latest.csv を自動で読みに行く
// ダッシュボードと同じリポジトリに置かれている前提
const DATA_PATH = 'yt_data/battle_latest.csv';

async function autoFetch() {
  const badge = document.getElementById('statusBadge');
  try {
    // 相対パスで同リポジトリのデータを読む
    const resp = await fetch(DATA_PATH + '?t=' + Date.now());
    if (!resp.ok) throw new Error(resp.status);
    const text = await resp.text();
    loadCSV(text);
    badge.textContent = '自動取得OK';
    badge.className = 'status ok';
  } catch (e) {
    // GitHub Pagesにデータがまだない or ローカル実行
    badge.textContent = 'CSV手動ドロップ';
    badge.className = 'status wait';
    document.getElementById('dateLine').textContent = 'CSVをドロップしてください';
  }
}

// CSV parse
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = []; let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; continue; }
      cur += ch;
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h, j) => row[h] = vals[j] || '');
    if (row.video_id && row.views) rows.push(row);
  }
  return rows;
}

function loadCSV(text) {
  const rows = parseCSV(text);
  allData = {};
  rows.forEach(r => {
    if (!allData[r.query]) allData[r.query] = [];
    allData[r.query].push({...r, views: parseInt(r.views) || 0});
  });
  document.getElementById('dropArea').classList.add('loaded');
  document.getElementById('tabs').style.display = 'flex';
  document.getElementById('dateLine').textContent =
    `${Object.keys(allData).length}キーワード / ${rows.length}本の動画`;
  showRanking();
}

function fmtN(n) { return n >= 10000 ? (n/10000).toFixed(1)+'万' : n.toLocaleString(); }

function analyze(videos) {
  const views = videos.map(v => v.views).sort((a,b) => a-b);
  const n = views.length;
  return {
    n, median: views[Math.floor(n/2)],
    mean: Math.round(views.reduce((a,b)=>a+b,0)/n),
    hit1k: views.filter(v => v >= 1000).length,
    rate1k: views.filter(v => v >= 1000).length/n,
    hit10k: views.filter(v => v >= 10000).length,
    max: views[n-1]
  };
}

function showRanking() {
  const entries = Object.entries(allData).map(([q, vids]) => ({query: q, ...analyze(vids)}));
  entries.sort((a,b) => b.rate1k - a.rate1k);
  const maxRate = Math.max(...entries.map(e => e.rate1k), 0.01);
  let html = '<table class="rank-table"><thead><tr><th>キーワード</th><th>打率</th><th>中央値</th><th>1万超</th><th>本数</th><th>最大</th></tr></thead><tbody>';
  entries.forEach(e => {
    const pct = (e.rate1k * 100).toFixed(0);
    const barW = Math.max(2, (e.rate1k / maxRate) * 120);
    html += `<tr onclick="showCompare('${e.query.replace(/'/g,"\\'")}')">`;
    html += `<td class="kw-name">${e.query}</td>`;
    html += `<td class="num"><span class="bar bar-win" style="width:${barW}px"></span> ${pct}%</td>`;
    html += `<td class="num">${fmtN(e.median)}</td>`;
    html += `<td class="num">${e.hit10k > 0 ? e.hit10k+'本' : '-'}</td>`;
    html += `<td class="num" style="color:var(--sub)">${e.n}</td>`;
    html += `<td class="num" style="color:var(--sub);font-size:11px">${fmtN(e.max)}</td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('rankingView').innerHTML = html;
  document.getElementById('rankingView').style.display = 'block';
  document.getElementById('compareView').classList.remove('show');
  setActiveTab('ranking');
}

function showCompare(query) {
  const vids = allData[query];
  if (!vids) return;
  const sorted = [...vids].sort((a,b) => b.views - a.views);
  const half = Math.min(6, Math.floor(sorted.length / 2));
  if (half < 1) return;
  const winners = sorted.slice(0, half);
  const loserPool = sorted.slice(-half).reverse();
  const winIds = new Set(winners.map(v => v.video_id));
  const losers = loserPool.filter(v => !winIds.has(v.video_id));
  const a = analyze(vids);
  const wMed = winners.map(v=>v.views).sort((a,b)=>a-b)[Math.floor(winners.length/2)];
  const lMed = losers.length ? losers.map(v=>v.views).sort((a,b)=>a-b)[Math.floor(losers.length/2)] : 0;

  function cards(list) {
    return list.map(v => `
      <a class="vcard" href="https://www.youtube.com/watch?v=${v.video_id}" target="_blank">
        <div class="thumb"><img loading="lazy" src="https://i.ytimg.com/vi/${v.video_id}/mqdefault.jpg"></div>
        <div class="views">${fmtN(v.views)}回</div>
        <div class="vtitle">${v.title.substring(0,60)}</div>
        <div class="vch">${v.channel.substring(0,25)}</div>
      </a>`).join('');
  }

  document.getElementById('compareView').innerHTML = `
    <div class="compare-title">
      <span class="back" onclick="showRanking()">← 一覧</span>
      <span>${query}</span>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="label">打率</div><div class="value">${(a.rate1k*100).toFixed(0)}%</div></div>
      <div class="stat-box"><div class="label">中央値</div><div class="value">${fmtN(a.median)}</div></div>
      <div class="stat-box"><div class="label">1万超</div><div class="value">${a.hit10k}本</div></div>
      <div class="stat-box"><div class="label">新着</div><div class="value">${a.n}本</div></div>
      <div class="stat-box"><div class="label">最大</div><div class="value">${fmtN(a.max)}</div></div>
    </div>
    <div class="split">
      <div><div class="col-label win">▲ 勝ち組 中央${fmtN(wMed)}回</div><div class="vgrid">${cards(winners)}</div></div>
      <div><div class="col-label lose">▼ 負け組 中央${fmtN(lMed)}回</div><div class="vgrid">${cards(losers)}</div></div>
    </div>`;
  document.getElementById('rankingView').style.display = 'none';
  document.getElementById('compareView').classList.add('show');
  setActiveTab('compare');
}

function setActiveTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => { if (t.dataset.tab === 'ranking') showRanking(); });
});

// File drop/pick (backup)
function handleFile(file) {
  const r = new FileReader();
  r.onload = e => { loadCSV(e.target.result); document.getElementById('statusBadge').textContent='CSV読込OK'; document.getElementById('statusBadge').className='status ok'; };
  r.readAsText(file, 'utf-8');
}
document.getElementById('fileIn').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.body.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('dropArea').classList.add('drag'); });
document.body.addEventListener('dragleave', () => document.getElementById('dropArea').classList.remove('drag'));
document.body.addEventListener('drop', e => { e.preventDefault(); document.getElementById('dropArea').classList.remove('drag'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

// Auto-fetch on load
autoFetch();
</script>
</body></html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="訪問ログ">
<meta name="theme-color" content="#0d0f14">
<title>訪問ログ｜かつらぎ屋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e8eaf0;font-family:'Noto Sans JP',sans-serif;min-height:100vh;padding-bottom:120px}
.hd{padding:16px 20px 12px;border-bottom:1px solid #1e2030;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#0d0f14;z-index:10}
.hd h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.hd .tab{display:flex;gap:4px}
.hd .tab button{background:none;border:1px solid #2a2d3a;color:#8b8fa3;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.hd .tab button.active{background:#2a2d3a;color:#e8eaf0;border-color:#3d4155}
.section{padding:16px 20px 8px}
.section-title{font-size:12px;color:#6b6f85;font-weight:500;margin-bottom:10px;letter-spacing:1px}
.company-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.company-btn{background:#151722;border:1px solid #2a2d3a;color:#c8cad4;padding:12px 4px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
.company-btn.selected{background:#1a3a5c;border-color:#2d7bd5;color:#7eb8f7}
.company-btn:active{transform:scale(.96)}
.store-input{width:100%;background:#151722;border:1px solid #2a2d3a;color:#e8eaf0;padding:12px 14px;border-radius:8px;font-size:15px;font-family:inherit;outline:none}
.store-input:focus{border-color:#3d4155}
.store-input::placeholder{color:#4a4e64}
.recent-stores{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.recent-btn{background:#1a1d2a;border:1px solid #252838;color:#8b8fa3;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit}
.recent-btn:active{background:#252838}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px}
.cat-chip{background:#151722;border:1px solid #2a2d3a;color:#9a9db0;padding:8px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
.cat-chip.selected{background:#1c3327;border-color:#2d9b5a;color:#6ee09a}
.cat-chip.kei{border-color:#3a2d1c}
.cat-chip.kei.selected{background:#3a2d1c;border-color:#d4a43a;color:#f0d060}
.cat-chip:active{transform:scale(.95)}
.result-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.result-btn{padding:14px 4px;border-radius:8px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;text-align:center;border:1px solid #2a2d3a;background:#151722;color:#9a9db0;transition:all .15s}
.result-btn:active{transform:scale(.96)}
.result-btn[data-v="爆益"].selected{background:#2a1520;border-color:#d4395a;color:#f06080}
.result-btn[data-v="微益"].selected{background:#2a2515;border-color:#d4a43a;color:#f0d060}
.result-btn[data-v="空振り"].selected{background:#1a1d2a;border-color:#6b6f85;color:#b0b3c4}
.result-btn[data-v="偵察"].selected{background:#151c2a;border-color:#3a6bd4;color:#70a0f0}
.detail-row{display:flex;gap:10px;align-items:center}
.profit-input{flex:1;background:#151722;border:1px solid #2a2d3a;color:#e8eaf0;padding:12px 14px;border-radius:8px;font-size:15px;font-family:inherit;outline:none}
.profit-input:focus{border-color:#3d4155}
.profit-input::placeholder{color:#4a4e64}
.yen{color:#6b6f85;font-size:14px}
.memo-input{width:100%;background:#151722;border:1px solid #2a2d3a;color:#e8eaf0;padding:12px 14px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;resize:none;height:60px}
.memo-input:focus{border-color:#3d4155}
.memo-input::placeholder{color:#4a4e64}
.failure-chips{display:flex;flex-wrap:wrap;gap:6px}
.failure-chip{background:#151722;border:1px solid #2a2d3a;color:#8b8fa3;padding:6px 12px;border-radius:16px;font-size:12px;cursor:pointer;font-family:inherit}
.failure-chip.selected{background:#2a1520;border-color:#d4395a;color:#f06080}
.submit-area{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;background:linear-gradient(transparent,#0d0f14 30%);z-index:10}
.submit-btn{width:100%;padding:16px;background:#2d7bd5;border:none;color:#fff;font-size:16px;font-weight:700;font-family:inherit;border-radius:10px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.submit-btn:active{transform:scale(.98);background:#2568b5}
.submit-btn:disabled{background:#2a2d3a;color:#6b6f85}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#1c3327;border:1px solid #2d9b5a;color:#6ee09a;padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:100;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:#2a1520;border-color:#d4395a;color:#f06080}
/* 履歴 */
#historyView{display:none;padding:16px 20px}
.log-card{background:#151722;border:1px solid #2a2d3a;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.log-date{color:#8b8fa3;font-size:12px}
.log-result{font-size:12px;font-weight:700;padding:3px 10px;border-radius:10px}
.log-result.爆益{background:#2a1520;color:#f06080}
.log-result.微益{background:#2a2515;color:#f0d060}
.log-result.空振り{background:#1a1d2a;color:#b0b3c4}
.log-result.偵察{background:#151c2a;color:#70a0f0}
.log-store{font-size:15px;font-weight:500;margin-bottom:4px}
.log-cat{font-size:12px;color:#6b6f85}
.log-profit{font-size:13px;color:#6ee09a;margin-top:4px}
.log-memo{font-size:12px;color:#6b6f85;margin-top:4px;font-style:italic}
.log-empty{text-align:center;color:#4a4e64;padding:40px 0;font-size:14px}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:#151722;border:1px solid #2a2d3a;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:11px;color:#6b6f85;margin-top:2px}
</style>
</head>
<body>

<div class="hd">
  <h1>🏬 訪問ログ</h1>
  <div class="tab">
    <button class="active" onclick="showTab('input')">入力</button>
    <button onclick="showTab('history')">履歴</button>
  </div>
</div>

<div id="inputView">

  <div class="section">
    <div class="section-title">企業</div>
    <div class="company-grid" id="companyGrid"></div>
  </div>

  <div class="section">
    <div class="section-title">店舗名</div>
    <input class="store-input" id="storeInput" type="text" placeholder="例：イオン高槻店">
    <div class="recent-stores" id="recentStores"></div>
  </div>

  <div class="section">
    <div class="section-title">カテゴリ（複数可）</div>
    <div class="cat-chips" id="catChips"></div>
  </div>

  <div class="section">
    <div class="section-title">結果</div>
    <div class="result-row" id="resultRow">
      <button class="result-btn" data-v="爆益" onclick="selectResult(this)">🔥爆益</button>
      <button class="result-btn" data-v="微益" onclick="selectResult(this)">💰微益</button>
      <button class="result-btn" data-v="空振り" onclick="selectResult(this)">💨空振り</button>
      <button class="result-btn" data-v="偵察" onclick="selectResult(this)">👁偵察</button>
    </div>
  </div>

  <div class="section" id="profitSection" style="display:none">
    <div class="section-title">粗利見込み</div>
    <div class="detail-row">
      <span class="yen">¥</span>
      <input class="profit-input" id="profitInput" type="number" placeholder="0" inputmode="numeric">
    </div>
  </div>

  <div class="section" id="failureSection" style="display:none">
    <div class="section-title">空振り理由</div>
    <div class="failure-chips" id="failureChips">
      <button class="failure-chip" onclick="selectFailure(this)">在庫なし</button>
      <button class="failure-chip" onclick="selectFailure(this)">値段合わず</button>
      <button class="failure-chip" onclick="selectFailure(this)">状態悪い</button>
      <button class="failure-chip" onclick="selectFailure(this)">競合先取り</button>
      <button class="failure-chip" onclick="selectFailure(this)">その他</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">メモ（任意）</div>
    <textarea class="memo-input" id="memoInput" placeholder="商品名、型番、気づきなど"></textarea>
  </div>

</div>

<div id="historyView">
  <div class="stats-bar" id="statsBar"></div>
  <div id="logList"></div>
</div>

<div class="submit-area" id="submitArea">
  <button class="submit-btn" id="submitBtn" onclick="submitLog()">記録する</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定 — ここを自分の環境に合わせる
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxzjPVVxGWP3u8nLCTZRhKGZjXgW5KjU3Jccq9HhzsD-kQ2jWLNVSpVwjHwMDPb3c7k/exec';
const ACCESS_KEY = 'katuragiya';

// ============================================================
// データ定義（Excelから）
// ============================================================
const COMPANIES = [
  'イオン','ビックカメラ','コジマ','ヤマダ電機',
  'エディオン','ジョーシン','ケーズデンキ','ヨドバシカメラ',
  'ノジマ','ソフマップ','ベスト電器','ゲオ'
];

const CATEGORIES = [
  {name:'デジカメ/ミラーレス',kei:true},{name:'カメラレンズ',kei:true},
  {name:'ゲーム機本体',kei:true},{name:'iPhone',kei:true},
  {name:'テレビ',kei:false},{name:'ブルーレイ/DVDレコーダー',kei:false},
  {name:'炊飯器',kei:false},{name:'電子レンジ/オーブン',kei:false},
  {name:'掃除機',kei:false},{name:'ロボット掃除機',kei:false},
  {name:'空気清浄機',kei:false},{name:'ノートPC',kei:false},
  {name:'Androidスマホ',kei:false},{name:'iPad',kei:false},
  {name:'タブレット',kei:false},{name:'美容家電',kei:false},
  {name:'プリンター',kei:false},{name:'加湿器',kei:false},
  {name:'コーヒーメーカー',kei:false},{name:'食器洗い乾燥機',kei:false},
  {name:'トースター',kei:false},{name:'ホットプレート',kei:false},
  {name:'電気ケトル/ポット',kei:false},{name:'ガスコンロ',kei:false}
];

// ============================================================
// 状態
// ============================================================
let selectedCompany = null;
let selectedCategories = new Set();
let selectedResult = null;
let selectedFailure = null;

// ============================================================
// 初期化
// ============================================================
function init() {
  renderCompanies();
  renderCategories();
  renderRecentStores();
}

function renderCompanies() {
  const grid = document.getElementById('companyGrid');
  grid.innerHTML = COMPANIES.map(c =>
    `<button class="company-btn" onclick="selectCompany(this,'${c}')">${c}</button>`
  ).join('');
}

function renderCategories() {
  const wrap = document.getElementById('catChips');
  wrap.innerHTML = CATEGORIES.map(c =>
    `<button class="cat-chip${c.kei?' kei':''}" onclick="toggleCat(this,'${c.name}')">${c.kei?'★ ':''}${c.name}</button>`
  ).join('');
}

function renderRecentStores() {
  const wrap = document.getElementById('recentStores');
  const recent = JSON.parse(localStorage.getItem('vl_recent_stores') || '[]');
  if (!recent.length) { wrap.innerHTML = ''; return; }
  wrap.innerHTML = recent.slice(0, 6).map(s =>
    `<button class="recent-btn" onclick="pickRecent('${s}')">${s}</button>`
  ).join('');
}

// ============================================================
// 選択ハンドラ
// ============================================================
function selectCompany(el, name) {
  document.querySelectorAll('.company-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedCompany = name;
}

function toggleCat(el, name) {
  el.classList.toggle('selected');
  if (selectedCategories.has(name)) selectedCategories.delete(name);
  else selectedCategories.add(name);
}

function selectResult(el) {
  document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedResult = el.dataset.v;

  document.getElementById('profitSection').style.display =
    (selectedResult === '爆益' || selectedResult === '微益') ? '' : 'none';
  document.getElementById('failureSection').style.display =
    selectedResult === '空振り' ? '' : 'none';
}

function selectFailure(el) {
  document.querySelectorAll('.failure-chip').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedFailure = el.textContent;
}

function pickRecent(name) {
  document.getElementById('storeInput').value = name;
  // 企業名の自動選択
  const comp = COMPANIES.find(c => name.startsWith(c) || name.includes(c));
  if (comp) {
    document.querySelectorAll('.company-btn').forEach(b => {
      b.classList.toggle('selected', b.textContent === comp);
    });
    selectedCompany = comp;
  }
}

// ============================================================
// 送信
// ============================================================
async function submitLog() {
  if (!selectedCompany) return showToast('企業を選択してください', true);
  if (!selectedResult) return showToast('結果を選択してください', true);

  const storeName = document.getElementById('storeInput').value.trim();
  const profit = document.getElementById('profitInput').value;
  const memo = document.getElementById('memoInput').value.trim();

  const data = {
    key: ACCESS_KEY,
    action: 'addVisitLog',
    timestamp: new Date().toISOString(),
    company: selectedCompany,
    store: storeName || selectedCompany,
    categories: [...selectedCategories].join(','),
    result: selectedResult,
    profit: profit || '',
    failure_reason: selectedResult === '空振り' ? (selectedFailure || '') : '',
    memo: memo
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (json.error) throw new Error(json.error);

    // 店舗名を履歴に保存
    if (storeName) {
      let recent = JSON.parse(localStorage.getItem('vl_recent_stores') || '[]');
      recent = [storeName, ...recent.filter(s => s !== storeName)].slice(0, 10);
      localStorage.setItem('vl_recent_stores', JSON.stringify(recent));
      renderRecentStores();
    }

    // ローカルにもキャッシュ
    let logs = JSON.parse(localStorage.getItem('vl_logs') || '[]');
    logs.unshift({...data, id: json.id || Date.now()});
    localStorage.setItem('vl_logs', JSON.stringify(logs.slice(0, 200)));

    showToast('✅ 記録しました');
    resetForm();
  } catch (e) {
    // オフライン対応：ローカルに保存して後で同期
    let pending = JSON.parse(localStorage.getItem('vl_pending') || '[]');
    pending.push(data);
    localStorage.setItem('vl_pending', JSON.stringify(pending));

    let logs = JSON.parse(localStorage.getItem('vl_logs') || '[]');
    logs.unshift({...data, id: 'pending_' + Date.now()});
    localStorage.setItem('vl_logs', JSON.stringify(logs.slice(0, 200)));

    showToast('📱 オフライン保存（後で同期）');
    resetForm();
  }

  btn.disabled = false;
  btn.textContent = '記録する';
}

function resetForm() {
  selectedCompany = null;
  selectedCategories.clear();
  selectedResult = null;
  selectedFailure = null;
  document.querySelectorAll('.selected').forEach(b => b.classList.remove('selected'));
  document.getElementById('storeInput').value = '';
  document.getElementById('profitInput').value = '';
  document.getElementById('memoInput').value = '';
  document.getElementById('profitSection').style.display = 'none';
  document.getElementById('failureSection').style.display = 'none';
}

// ============================================================
// タブ切替
// ============================================================
function showTab(tab) {
  document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (tab === 'input') {
    document.getElementById('inputView').style.display = '';
    document.getElementById('historyView').style.display = 'none';
    document.getElementById('submitArea').style.display = '';
  } else {
    document.getElementById('inputView').style.display = 'none';
    document.getElementById('historyView').style.display = '';
    document.getElementById('submitArea').style.display = 'none';
    renderHistory();
  }
}

// ============================================================
// 履歴表示
// ============================================================
function renderHistory() {
  const logs = JSON.parse(localStorage.getItem('vl_logs') || '[]');
  const list = document.getElementById('logList');
  const stats = document.getElementById('statsBar');

  if (!logs.length) {
    stats.innerHTML = '';
    list.innerHTML = '<div class="log-empty">まだログがありません</div>';
    return;
  }

  // 統計
  const total = logs.length;
  const hits = logs.filter(l => l.result === '爆益' || l.result === '微益').length;
  const totalProfit = logs.reduce((s, l) => s + (parseInt(l.profit) || 0), 0);

  stats.innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">総訪問</div></div>
    <div class="stat-box"><div class="stat-num">${total ? Math.round(hits/total*100) : 0}%</div><div class="stat-label">ヒット率</div></div>
    <div class="stat-box"><div class="stat-num">¥${totalProfit.toLocaleString()}</div><div class="stat-label">累計粗利</div></div>
  `;

  list.innerHTML = logs.slice(0, 50).map(l => {
    const d = new Date(l.timestamp);
    const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
    <div class="log-card">
      <div class="log-top">
        <span class="log-date">${dateStr}</span>
        <span class="log-result ${l.result}">${l.result}</span>
      </div>
      <div class="log-store">${l.store || l.company}</div>
      ${l.categories ? `<div class="log-cat">${l.categories}</div>` : ''}
      ${l.profit ? `<div class="log-profit">¥${parseInt(l.profit).toLocaleString()}</div>` : ''}
      ${l.failure_reason ? `<div class="log-memo">理由: ${l.failure_reason}</div>` : ''}
      ${l.memo ? `<div class="log-memo">${l.memo}</div>` : ''}
    </div>`;
  }).join('');
}

// ============================================================
// トースト
// ============================================================
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// ============================================================
// 未送信データの同期
// ============================================================
async function syncPending() {
  let pending = JSON.parse(localStorage.getItem('vl_pending') || '[]');
  if (!pending.length) return;

  const synced = [];
  for (const data of pending) {
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      const json = await res.json();
      if (!json.error) synced.push(data);
    } catch (e) { break; }
  }

  if (synced.length) {
    pending = pending.filter(d => !synced.includes(d));
    localStorage.setItem('vl_pending', JSON.stringify(pending));
    if (synced.length > 0) showToast(`📡 ${synced.length}件 同期完了`);
  }
}

// ============================================================
init();
setTimeout(syncPending, 3000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>かつらぎ家計簿 v6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #0e0e18;
  --sur: #16162a;
  --sur2: #1e1e36;
  --bdr: #2a2a4a;
  --ac: #7c6dff;
  --ac2: #ff6b6b;
  --ac3: #43d9ad;
  --ac4: #ffd166;
  --tx: #e8e8f0;
  --txd: #8888aa;
  --txm: #44445a;
  --r: 10px;
  --jp: 'Zen Kaku Gothic New', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow-x: hidden; }
body { background: var(--bg); color: var(--tx); font-family: var(--jp); padding-bottom: 140px; }

/* ── ヘッダー ── */
.hdr {
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  padding: 12px 16px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; gap: 10px;
}
.hdr-logo {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  color: var(--ac); border: 1px solid var(--ac); border-radius: 4px;
  padding: 2px 7px; letter-spacing: .12em;
}
.hdr-title { font-size: 15px; font-weight: 700; }
.hdr-date { font-family: var(--mono); font-size: 11px; color: var(--txd); margin-left: auto; }

/* ── 総資産バー ── */
.total-bar {
  background: var(--sur2); border-bottom: 1px solid var(--bdr);
  padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.total-item { display: flex; flex-direction: column; gap: 1px; }
.total-label { font-size: 9px; color: var(--txd); letter-spacing: .05em; }
.total-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--ac3); }
.total-val.pred { color: var(--ac4); font-size: 13px; }

/* ── 口座不足カード ── */
.shortage-bar {
  padding: 8px 10px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  border-bottom: 1px solid var(--bdr);
}
.ac-card {
  background: var(--sur2);
  border: 1px solid var(--bdr); border-radius: 8px;
  padding: 6px 8px;
}
.ac-card.danger { border-color: var(--ac2); background: rgba(255,107,107,.07); }
.ac-card.warn { border-color: var(--ac4); background: rgba(255,209,102,.05); }
.ac-card.ok { border-color: var(--ac3); background: rgba(67,217,173,.05); }
.ac-name { font-size: 10px; color: var(--txd); margin-bottom: 3px; }
.ac-bal { font-family: var(--mono); font-size: 14px; font-weight: 600; }
.ac-card.danger .ac-bal { color: var(--ac2); }
.ac-card.warn .ac-bal { color: var(--ac4); }
.ac-card.ok .ac-bal { color: var(--ac3); }
.ac-pred { font-size: 9px; color: var(--txd); margin-top: 2px; }
.ac-shortage { font-size: 10px; font-weight: 700; color: var(--ac2); }

/* ── タブ ── */
.tabs {
  display: flex; background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  position: sticky; top: 54px; z-index: 90;
}
.tab {
  flex: 1; padding: 10px 4px; text-align: center;
  font-size: 12px; font-weight: 700; color: var(--txd);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s;
}
.tab.active { color: var(--ac); border-bottom-color: var(--ac); }

/* ── ページ ── */
.page { display: none; }
.page.active { display: block; }

/* ── カレンダー ── */
.cal-wrap { padding: 10px 12px; }
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-nav button {
  background: var(--sur2); border: 1px solid var(--bdr);
  color: var(--tx); border-radius: 6px; padding: 5px 14px;
  font-size: 12px; cursor: pointer;
}
.cal-nav h3 { font-size: 15px; font-weight: 700; }
.cal-grid { background: var(--sur); border-radius: var(--r); border: 1px solid var(--bdr); overflow: hidden; }
.cal-hdr-row { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--bdr); }
.cal-hd { text-align: center; padding: 6px 0; font-size: 10px; color: var(--txd); }
.cal-hd:first-child { color: var(--ac2); }
.cal-hd:last-child { color: var(--ac); }
.cal-week { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-cell {
  min-height: 62px; border-right: 1px solid var(--bdr);
  border-bottom: 1px solid var(--bdr); padding: 3px 2px;
  cursor: pointer; overflow: hidden; transition: background .15s;
}
.cal-cell:last-child { border-right: none; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell:hover { background: var(--sur2); }
.cal-cell.today { background: rgba(124,109,255,.08); }
.cal-day {
  font-size: 12px; font-weight: 700; text-align: center;
  width: 22px; height: 22px; line-height: 22px;
  margin: 0 auto 2px; border-radius: 50%;
}
.cal-day.today-n { background: var(--ac); color: #fff; font-size: 11px; }
.cal-day.sun { color: var(--ac2); }
.cal-day.sat { color: var(--ac); }
.cal-day.other { color: var(--txm); }
.cal-chips { display: flex; flex-direction: column; gap: 1px; }
.cal-chip {
  font-size: 8px; border-radius: 2px; padding: 1px 3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.chip-expense { background: rgba(255,107,107,.2); color: #ff9999; }
.chip-income { background: rgba(67,217,173,.2); color: #43d9ad; }
.chip-transfer { background: rgba(124,109,255,.2); color: #9d91ff; }
.chip-planned { opacity: .6; border: 1px dashed; background: transparent; }
.chip-planned.chip-expense { border-color: #ff9999; color: #ff9999; }
.chip-planned.chip-income { border-color: #43d9ad; color: #43d9ad; }
.chip-planned.chip-transfer { border-color: #9d91ff; color: #9d91ff; }

/* ── 入力シート ── */
.input-wrap { padding: 12px; }
.mode-btns { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-btn {
  flex: 1; padding: 10px 0; border: 2px solid var(--bdr);
  border-radius: 8px; background: var(--sur2); color: var(--txd);
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: var(--jp); transition: all .15s;
}
.mode-btn.active-expense { border-color: var(--ac2); color: var(--ac2); background: rgba(255,107,107,.08); }
.mode-btn.active-income { border-color: var(--ac3); color: var(--ac3); background: rgba(67,217,173,.08); }
.mode-btn.active-transfer { border-color: var(--ac); color: var(--ac); background: rgba(124,109,255,.08); }
.fg { margin-bottom: 12px; }
.fg label { font-size: 11px; color: var(--txd); display: block; margin-bottom: 4px; font-weight: 600; letter-spacing: .05em; }
.fg input, .fg select, .fg textarea {
  width: 100%; font-size: 15px; padding: 10px 12px;
  border: 1px solid var(--bdr); border-radius: 8px;
  background: var(--sur2); color: var(--tx);
  font-family: var(--jp); outline: none; transition: border-color .2s;
}
.fg input:focus, .fg select:focus { border-color: var(--ac); }
.fg input.amount { font-family: var(--mono); font-size: 22px; font-weight: 600; text-align: right; }
.status-row { display: flex; gap: 6px; margin-bottom: 12px; }
.status-btn {
  flex: 1; padding: 8px; border-radius: 6px;
  border: 1px solid var(--bdr); background: var(--sur2);
  color: var(--txd); font-size: 12px; font-weight: 600;
  cursor: pointer; font-family: var(--jp); transition: all .15s;
}
.status-btn.active-real { border-color: var(--ac3); color: var(--ac3); background: rgba(67,217,173,.08); }
.status-btn.active-plan { border-color: var(--ac4); color: var(--ac4); background: rgba(255,209,102,.08); }
.btn-save {
  width: 100%; padding: 14px; font-size: 15px; font-weight: 700;
  border: none; border-radius: 10px; cursor: pointer;
  font-family: var(--jp); transition: all .15s;
}
.btn-save.expense { background: var(--ac2); color: #fff; }
.btn-save.income { background: var(--ac3); color: #0e0e18; }
.btn-save.transfer { background: var(--ac); color: #fff; }
.btn-save:active { transform: scale(.97); }

/* ── 一覧 ── */
.list-wrap { padding: 12px; }
.list-filter { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
.list-filter::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--bdr); background: var(--sur2);
  color: var(--txd); font-size: 11px; cursor: pointer;
  font-family: var(--jp); transition: all .15s;
}
.filter-btn.active { border-color: var(--ac); color: var(--ac); background: rgba(124,109,255,.1); }
.tx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--sur2);
  border: 1px solid var(--bdr); border-radius: 8px;
  margin-bottom: 6px; cursor: pointer;
  transition: border-color .15s;
}
.tx-item:hover { border-color: var(--ac); }
.tx-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-expense { background: var(--ac2); }
.dot-income { background: var(--ac3); }
.dot-transfer { background: var(--ac); }
.tx-body { flex: 1; min-width: 0; }
.tx-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-meta { font-size: 10px; color: var(--txd); margin-top: 1px; }
.tx-plan-badge {
  font-size: 9px; border: 1px dashed var(--ac4); color: var(--ac4);
  border-radius: 3px; padding: 1px 4px; margin-left: 4px;
}
.tx-amount { font-family: var(--mono); font-size: 14px; font-weight: 600; flex-shrink: 0; }
.amount-expense { color: var(--ac2); }
.amount-income { color: var(--ac3); }
.amount-transfer { color: var(--ac); }
.tx-del {
  background: none; border: none; color: var(--txm);
  font-size: 14px; cursor: pointer; padding: 2px 4px;
  flex-shrink: 0;
}
.tx-del:hover { color: var(--ac2); }
.empty-msg { text-align: center; color: var(--txd); font-size: 13px; padding: 40px 0; }

/* ── 不足アラートパネル ── */
.alert-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--sur); border-top: 1px solid var(--bdr);
  z-index: 150; max-height: 40vh; overflow-y: auto;
}
.alert-panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; border-bottom: 1px solid var(--bdr);
  cursor: pointer;
}
.alert-panel-title { font-size: 12px; font-weight: 700; color: var(--txd); }
.alert-panel-count { font-family: var(--mono); font-size: 11px; }
.alert-panel-body { padding: 6px 10px 10px; display: flex; flex-direction: column; gap: 5px; }
.alert-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 8px; border: 1px solid;
}
.alert-item.red  { background: rgba(255,107,107,.08); border-color: rgba(255,107,107,.4); }
.alert-item.yellow { background: rgba(255,209,102,.06); border-color: rgba(255,209,102,.4); }
.alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.alert-dot.red    { background: var(--ac2); }
.alert-dot.yellow { background: var(--ac4); }
.alert-body { flex: 1; min-width: 0; }
.alert-name { font-size: 12px; font-weight: 700; }
.alert-sub  { font-size: 10px; color: var(--txd); margin-top: 2px; }
.alert-amount { font-family: var(--mono); font-size: 13px; font-weight: 700; flex-shrink: 0; }
.alert-amount.red    { color: var(--ac2); }
.alert-amount.yellow { color: var(--ac4); }
.alert-days { font-family: var(--mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
.alert-days.red    { background: rgba(255,107,107,.2); color: var(--ac2); }
.alert-days.yellow { background: rgba(255,209,102,.2); color: var(--ac4); }

/* ── タグ ── */
.tag-area { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.tag-btn {
  padding:5px 10px; border-radius:16px; font-size:11px; font-weight:600;
  border:1px solid var(--bdr); background:var(--sur2); color:var(--txd);
  cursor:pointer; font-family:var(--jp); transition:all .15s;
}
.tag-btn:hover { border-color:var(--ac); color:var(--ac); }
.chip-memo { font-size:8px; color:var(--txd); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 2px; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 18px; right: 16px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--ac); color: #fff; border: none;
  font-size: 24px; cursor: pointer; z-index: 200;
  box-shadow: 0 4px 20px rgba(124,109,255,.5);
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.fab:active { transform: scale(.9); }

/* ── オーバーレイ ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.sheet {
  background: var(--sur); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 520px;
  padding: 16px 16px 36px; max-height: 92vh; overflow-y: auto;
}
.sheet-handle { width: 36px; height: 4px; background: var(--bdr); border-radius: 2px; margin: 0 auto 14px; }
.sheet-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.sheet-btns { display: flex; gap: 8px; margin-top: 14px; }
.btn-cancel {
  padding: 11px 16px; border: 1px solid var(--bdr);
  background: var(--sur2); color: var(--txd);
  border-radius: 8px; cursor: pointer; font-family: var(--jp); font-size: 13px;
}
.btn-del-tx {
  padding: 11px 16px; border: 1px solid rgba(255,107,107,.4);
  background: rgba(255,107,107,.08); color: var(--ac2);
  border-radius: 8px; cursor: pointer; font-family: var(--jp); font-size: 13px;
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">KAKEIBO</div>
  <div class="hdr-title">かつらぎ家計簿</div>
  <div class="hdr-date" id="todayLabel"></div>
  <button onclick="hardReset()" style="margin-left:8px;font-size:9px;padding:2px 7px;border:1px solid rgba(255,107,107,.4);background:transparent;color:var(--ac2);border-radius:4px;cursor:pointer;font-family:var(--mono)">RESET</button>
</header>

<!-- 口座残高・不足カード -->
<div class="total-bar" id="totalBar">
  <div class="total-item">
    <div class="total-label">現在総資産</div>
    <div class="total-val" id="totalNow">¥0</div>
  </div>
  <div class="total-item" style="text-align:right">
    <div class="total-label">予測総資産</div>
    <div class="total-val pred" id="totalPred">¥0</div>
  </div>
</div>
<div class="shortage-bar" id="shortageBar"></div>

<!-- タブ -->
<div class="tabs">
  <button class="tab active" data-tab="cal" onclick="switchTab('cal')">📅 カレンダー</button>
  <button class="tab" data-tab="input" onclick="switchTab('input')">✏️ 入力</button>
  <button class="tab" data-tab="list" onclick="switchTab('list')">📋 一覧</button>
  <button class="tab" data-tab="accounts" onclick="switchTab('accounts')">🏦 口座</button>
</div>

<!-- カレンダーページ -->
<div class="page active" id="page-cal">
  <div class="cal-wrap">
    <div class="cal-nav">
      <button onclick="shiftMonth(-1)">◀ 前月</button>
      <h3 id="calLabel"></h3>
      <button onclick="shiftMonth(1)">翌月 ▶</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- 入力ページ -->
<div class="page" id="page-input">
  <div class="input-wrap">
    <div class="mode-btns">
      <button class="mode-btn active-expense" id="btnExpense" onclick="setMode('expense')">💸 支出</button>
      <button class="mode-btn" id="btnIncome" onclick="setMode('income')">💰 収入</button>
      <button class="mode-btn" id="btnTransfer" onclick="setMode('transfer')">🔄 振替</button>
    </div>
    <div class="status-row">
      <button class="status-btn active-real" id="btnReal" onclick="setStatus('real')">✅ 実績</button>
      <button class="status-btn" id="btnPlan" onclick="setStatus('plan')">📅 予定</button>
    </div>
    <div class="fg">
      <label>日付</label>
      <input type="date" id="inDate">
    </div>
    <div class="fg">
      <label>金額（円）</label>
      <input type="number" class="amount" id="inAmount" placeholder="0" inputmode="numeric">
    </div>
    <div class="fg" id="fgFrom">
      <label id="lblFrom">支出元口座</label>
      <select id="inFrom"></select>
    </div>
    <div class="fg" id="fgTo" style="display:none">
      <label>入金先口座</label>
      <select id="inTo"></select>
    </div>
    <div class="fg">
      <label>内容</label>
      <input type="text" id="inDesc" placeholder="例: 楽天カード引落、買取屋振込...">
    </div>
    <div class="fg">
      <label>カテゴリ（任意）</label>
      <select id="inCat">
        <option value="">─ 選択 ─</option>
        <option>買取振込</option>
        <option>PayPayチャージ</option>
        <option>カード引落</option>
        <option>給与</option>
        <option>生活費</option>
        <option>食費</option>
        <option>光熱費</option>
        <option>税金</option>
        <option>その他</option>
      </select>
    </div>
    <div class="fg">
      <label>メモ / タグ（任意）</label>
      <div class="tag-area" id="tagArea"></div>
      <input type="text" id="inMemo" placeholder="メモ or タグを選択...">
    </div>
    <div id="inputBtns" style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="cancelInput()" style="flex:1;padding:13px;font-size:13px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txd);border-radius:10px;cursor:pointer;font-family:var(--jp)">キャンセル</button>
      <button id="btnDeleteEditing" onclick="deleteEditing()" style="display:none;flex:1;padding:13px;font-size:13px;border:1px solid rgba(255,107,107,.4);background:rgba(255,107,107,.08);color:var(--ac2);border-radius:10px;cursor:pointer;font-family:var(--jp)">🗑 削除</button>
    </div>
    <button class="btn-save expense" id="btnSave" onclick="saveTx()">支出を記録</button>
  </div>
</div>

<!-- 一覧ページ -->
<div class="page" id="page-list">
  <div class="list-wrap">
    <div class="list-filter">
      <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
      <button class="filter-btn" onclick="setFilter('expense',this)">支出</button>
      <button class="filter-btn" onclick="setFilter('income',this)">収入</button>
      <button class="filter-btn" onclick="setFilter('transfer',this)">振替</button>
      <button class="filter-btn" onclick="setFilter('plan',this)">予定のみ</button>
      <button class="filter-btn" onclick="setFilter('real',this)">実績のみ</button>
    </div>
    <div id="txList"></div>
  </div>
</div>

<!-- 口座管理ページ -->
<div class="page" id="page-accounts">
  <div class="input-wrap">
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">口座一覧</div>
      <div id="acList"></div>
    </div>
    <div style="background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;padding:14px;">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">口座を追加</div>
      <div class="fg">
        <label>口座名</label>
        <input type="text" id="newAcName" placeholder="例: 楽天銀行、現金...">
      </div>
      <div class="fg">
        <label>種別</label>
        <select id="newAcType">
          <option value="bank">銀行</option>
          <option value="cash">現金</option>
          <option value="paypay">PayPay</option>
          <option value="card">カード（負債）</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="fg">
        <label>現在残高（円）</label>
        <input type="number" id="newAcBal" placeholder="0" inputmode="numeric">
      </div>
      <button class="btn-save income" onclick="addAccount()">口座を追加</button>
    </div>
  </div>
</div>

<button class="fab" onclick="switchTab('input')">＋</button>

<!-- 不足アラートパネル -->
<div class="alert-panel" id="alertPanel" style="display:none">
  <div class="alert-panel-hdr" onclick="toggleAlertPanel()">
    <span class="alert-panel-title">⚠️ 残高不足アラート</span>
    <span class="alert-panel-count" id="alertCount"></span>
  </div>
  <div class="alert-panel-body" id="alertBody" style="display:none"></div>
</div>

// ─── 定数・状態 ───
const today    = new Date();
const todayStr = d2s(today);
let mode       = 'expense';
let txStatus   = 'real';
let calOff     = 0;
let listFilter = 'all';
let detailTxId  = null;
let editingTxId = null;

document.getElementById('todayLabel').textContent =
  today.getFullYear() + '/' + String(today.getMonth()+1).padStart(2,'0') + '/' + String(today.getDate()).padStart(2,'0');

// ─── 残高計算 ───
function calcBal(ac) {
  let bal = (typeof ac.baseBal === 'number' && !isNaN(ac.baseBal)) ? ac.baseBal : 0;
  txList.forEach(tx => {
    if (tx.status !== 'real' || tx.date > todayStr) return;
    if (tx.type === 'expense'  && tx.fromAc === ac.id) bal -= tx.amount;
    if (tx.type === 'income'   && tx.toAc   === ac.id) bal += tx.amount;
    if (tx.type === 'transfer') {
      if (tx.fromAc === ac.id) bal -= tx.amount;
      if (tx.toAc   === ac.id) bal += tx.amount;
    }
  });
  return bal;
}

function calcPredBal(ac) {
  let pred = calcBal(ac);
  txList.forEach(tx => {
    if (tx.date <= todayStr) return;
    if (tx.type === 'expense'  && tx.fromAc === ac.id) pred -= tx.amount;
    if (tx.type === 'income'   && tx.toAc   === ac.id) pred += tx.amount;
    if (tx.type === 'transfer') {
      if (tx.fromAc === ac.id) pred -= tx.amount;
      if (tx.toAc   === ac.id) pred += tx.amount;
    }
  });
  return pred;
}

// ─── 口座残高カード ───
function renderShortageBar() {
  const bar = document.getElementById('shortageBar');
  bar.innerHTML = '';
  let totalNow = 0, totalPred = 0;
  accounts.forEach(ac => {
    const bal  = calcBal(ac);
    const pred = calcPredBal(ac);
    totalNow  += bal;
    totalPred += pred;
    const cls  = pred < 0 ? 'danger' : (pred < bal * 0.2 && bal > 0) ? 'warn' : 'ok';
    const card = document.createElement('div');
    card.className = 'ac-card ' + cls;
    card.innerHTML = `
      <div class="ac-name">${ac.name}</div>
      <div class="ac-bal">${fmtMoney(bal)}</div>
      <div class="ac-pred">予測: ${fmtMoney(pred)}</div>
      ${pred < 0 ? `<div class="ac-shortage">不足 ${fmtMoney(-pred)}</div>` : ''}
    `;
    bar.appendChild(card);
  });
  const tnEl = document.getElementById('totalNow');
  const tpEl = document.getElementById('totalPred');
  if (tnEl) tnEl.textContent = fmtMoney(totalNow);
  if (tpEl) tpEl.textContent = fmtMoney(totalPred);
}

// ─── タブ切替 ───
function goHome() {
  editingTxId = null;
  document.getElementById('btnSave').textContent =
    mode === 'expense' ? '支出を記録' : mode === 'income' ? '収入を記録' : '振替を記録';
  document.getElementById('btnDeleteEditing').style.display = 'none';
  renderShortageBar();
  renderCal();
  renderAlerts();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'cal'));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-cal'));
}

function switchTab(tab) {
  if (tab !== 'input') {
    editingTxId = null;
    document.getElementById('btnSave').textContent =
      mode === 'expense' ? '支出を記録' : mode === 'income' ? '収入を記録' : '振替を記録';
    document.getElementById('btnDeleteEditing').style.display = 'none';
  }
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + tab));
  if (tab === 'cal')      { renderShortageBar(); renderCal(); }
  if (tab === 'list')     renderList();
  if (tab === 'input')    { populateSelects(); if (!editingTxId) initInputDate(); renderTags(); }
  if (tab === 'accounts') renderAccounts();
}

// ─── カレンダー ───
function shiftMonth(d) { calOff += d; renderCal(); }

function renderCal() {
  const base = new Date(today.getFullYear(), today.getMonth() + calOff, 1);
  document.getElementById('calLabel').textContent = base.getFullYear() + '年' + (base.getMonth()+1) + '月';
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const hdrRow = document.createElement('div');
  hdrRow.className = 'cal-hdr-row';
  ['日','月','火','水','木','金','土'].forEach(d => {
    const h = document.createElement('div'); h.className = 'cal-hd'; h.textContent = d;
    hdrRow.appendChild(h);
  });
  grid.appendChild(hdrRow);
  let cur = new Date(base);
  cur.setDate(1 - base.getDay());
  for (let w = 0; w < 6; w++) {
    const wr = document.createElement('div'); wr.className = 'cal-week';
    for (let d = 0; d < 7; d++) {
      const ds = d2s(cur);
      const isThis = cur.getMonth() === base.getMonth();
      const cell = document.createElement('div');
      cell.className = 'cal-cell' + (ds === todayStr ? ' today' : '');
      const dayCls = ds === todayStr ? 'today-n' : !isThis ? 'other' : d === 0 ? 'sun' : d === 6 ? 'sat' : '';
      const dayEl = document.createElement('div');
      dayEl.className = 'cal-day' + (dayCls ? ' ' + dayCls : '');
      dayEl.textContent = cur.getDate();
      cell.appendChild(dayEl);
      const dayTxs = txList.filter(tx => tx.date === ds).slice(0, 3);
      if (dayTxs.length) {
        const chips = document.createElement('div'); chips.className = 'cal-chips';
        dayTxs.forEach(tx => {
          const c = document.createElement('div');
          c.className = 'cal-chip chip-' + tx.type + (tx.status === 'plan' ? ' chip-planned' : '');
          c.style.cursor = 'pointer';
          const sign = tx.type === 'expense' ? '-' : tx.type === 'income' ? '+' : '⇄';
          const chipMain = document.createElement('span');
          chipMain.textContent = sign + fmtMoneyShort(tx.amount) + ' ' + tx.desc;
          c.appendChild(chipMain);
          if (tx.memo) {
            const chipMemo = document.createElement('div');
            chipMemo.className = 'chip-memo';
            chipMemo.textContent = tx.memo;
            c.appendChild(chipMemo);
          }
          c.onclick = (e) => { e.stopPropagation(); editTx(tx.id); };
          chips.appendChild(c);
        });
        cell.appendChild(chips);
      }
      cell.onclick = () => {
        // 直接タブ切替（switchTabのinitInputDateで上書きされないよう）
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'input'));
        document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-input'));
        editingTxId = null;
        populateSelects();
        document.getElementById('inDate').value = ds;
        document.getElementById('btnSave').textContent = mode === 'expense' ? '支出を記録' : mode === 'income' ? '収入を記録' : '振替を記録';
        document.getElementById('btnDeleteEditing').style.display = 'none';
        renderTags();
      };
      wr.appendChild(cell);
      cur.setDate(cur.getDate() + 1);
    }
    grid.appendChild(wr);
    if (cur.getMonth() > base.getMonth() && cur.getFullYear() >= base.getFullYear()) break;
  }
}

// ─── 入力 ───
function initInputDate() {
  document.getElementById('inDate').value = todayStr;
}

function setMode(m) {
  mode = m;
  ['expense','income','transfer'].forEach(x => {
    document.getElementById('btn' + x.charAt(0).toUpperCase() + x.slice(1))
      .className = 'mode-btn' + (x === m ? ' active-' + x : '');
  });
  const fgTo   = document.getElementById('fgTo');
  const lblFrom = document.getElementById('lblFrom');
  if (m === 'expense')     { fgTo.style.display = 'none';  lblFrom.textContent = '支出元口座'; }
  else if (m === 'income') { fgTo.style.display = 'none';  lblFrom.textContent = '入金先口座'; }
  else                     { fgTo.style.display = 'block'; lblFrom.textContent = '振替元口座'; }
  const btn = document.getElementById('btnSave');
  btn.className = 'btn-save ' + m;
  if (!editingTxId) btn.textContent = m === 'expense' ? '支出を記録' : m === 'income' ? '収入を記録' : '振替を記録';
}

function setStatus(s) {
  txStatus = s;
  document.getElementById('btnReal').className = 'status-btn' + (s === 'real' ? ' active-real' : '');
  document.getElementById('btnPlan').className = 'status-btn' + (s === 'plan' ? ' active-plan' : '');
}

function populateSelects() {
  ['inFrom','inTo'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = accounts.map(ac => `<option value="${ac.id}">${ac.name}</option>`).join('');
  });
}

function saveTx() {
  const amount = parseInt(document.getElementById('inAmount').value) || 0;
  const date   = document.getElementById('inDate').value;
  const desc   = document.getElementById('inDesc').value.trim();
  if (!amount || !date) { alert('日付と金額は必須です'); return; }
  const fromId = document.getElementById('inFrom').value;
  const toId   = document.getElementById('inTo').value;

  if (editingTxId) {
    txList = txList.filter(t => t.id !== editingTxId);
  }

  txList.push({
    id:     Date.now().toString(),
    type:   mode,
    status: txStatus,
    date,
    amount,
    fromAc: mode === 'income'  ? null : fromId,
    toAc:   mode === 'expense' ? null : (mode === 'income' ? fromId : toId),
    desc:   desc || (mode === 'expense' ? '支出' : mode === 'income' ? '収入' : '振替'),
    cat:    document.getElementById('inCat').value,
    memo:   document.getElementById('inMemo').value,
  });

  saveAll();
  goHome();
}

function cancelInput() {
  document.getElementById('inAmount').value = '';
  document.getElementById('inDesc').value   = '';
  document.getElementById('inMemo').value   = '';
  document.getElementById('inCat').value    = '';
  goHome();
}

function deleteEditing() {
  if (!editingTxId) { alert('editingTxId が null です'); return; }
  txList = txList.filter(t => t.id !== editingTxId);
  saveAll();
  goHome();
}

// ─── 編集 ───
function editTx(txId) {
  const tx = txList.find(t => t.id === txId);
  if (!tx) return;
  editingTxId = txId;
  document.getElementById('detailOverlay').classList.remove('open');
  detailTxId = null;
  // タブ切替（switchTabはeditingTxIdをリセットするので直接DOM操作）
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'input'));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-input'));
  populateSelects();
  setMode(tx.type);
  setStatus(tx.status);
  document.getElementById('inDate').value   = tx.date;
  document.getElementById('inAmount').value = tx.amount;
  if (tx.fromAc) document.getElementById('inFrom').value = tx.fromAc;
  if (tx.toAc)   document.getElementById('inTo').value   = tx.toAc;
  document.getElementById('inDesc').value = tx.desc;
  document.getElementById('inCat').value  = tx.cat  || '';
  document.getElementById('inMemo').value = tx.memo || '';
  document.getElementById('btnSave').textContent = '更新する';
  document.getElementById('btnDeleteEditing').style.display = 'block';
  renderTags();
}

function editTxFromDetail() { editTx(detailTxId); }

// ─── 一覧 ───
function setFilter(f, btn) {
  listFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const wrap = document.getElementById('txList');
  wrap.innerHTML = '';
  let filtered = [...txList].sort((a,b) => b.date.localeCompare(a.date));
  if (listFilter === 'expense')       filtered = filtered.filter(t => t.type === 'expense');
  else if (listFilter === 'income')   filtered = filtered.filter(t => t.type === 'income');
  else if (listFilter === 'transfer') filtered = filtered.filter(t => t.type === 'transfer');
  else if (listFilter === 'plan')     filtered = filtered.filter(t => t.status === 'plan');
  else if (listFilter === 'real')     filtered = filtered.filter(t => t.status === 'real');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty-msg">取引がありません</div>'; return; }
  filtered.forEach(tx => {
    const sign = tx.type === 'expense' ? '-' : tx.type === 'income' ? '+' : '⇄';
    const fromName = accounts.find(a => a.id === tx.fromAc)?.name || '';
    const toName   = accounts.find(a => a.id === tx.toAc)?.name   || '';
    const acInfo   = tx.type === 'transfer' ? `${fromName} → ${toName}` : fromName || toName;
    const item = document.createElement('div');
    item.className = 'tx-item';
    item.innerHTML = `
      <div class="tx-dot dot-${tx.type}"></div>
      <div class="tx-body">
        <div class="tx-name">${tx.desc}${tx.status==='plan'?'<span class="tx-plan-badge">予定</span>':''}</div>
        <div class="tx-meta">${tx.date}　${acInfo}${tx.cat ? '　' + tx.cat : ''}</div>
      </div>
      <div class="tx-amount amount-${tx.type}">${sign}${fmtMoney(tx.amount)}</div>
    `;
    item.onclick = () => editTx(tx.id);
    wrap.appendChild(item);
  });
}

// ─── 詳細オーバーレイ ───
function openDetail(id) {
  const tx = txList.find(t => t.id === id);
  if (!tx) return;
  detailTxId = id;
  const fromName = accounts.find(a => a.id === tx.fromAc)?.name || '—';
  const toName   = accounts.find(a => a.id === tx.toAc)?.name   || '—';
  document.getElementById('detailTitle').textContent = tx.desc;
  document.getElementById('detailBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;font-size:13px;">
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">種別</span><span>${tx.type==='expense'?'💸 支出':tx.type==='income'?'💰 収入':'🔄 振替'}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">状態</span><span>${tx.status==='real'?'✅ 実績':'📅 予定'}</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">金額</span><span style="font-family:var(--mono);font-size:17px;font-weight:700">${fmtMoney(tx.amount)}円</span></div>
      <div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">日付</span><span>${tx.date}</span></div>
      ${tx.type!=='income'  ? `<div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">出金元</span><span>${fromName}</span></div>` : ''}
      ${tx.type!=='expense' ? `<div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">入金先</span><span>${toName}</span></div>` : ''}
      ${tx.cat  ? `<div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">カテゴリ</span><span>${tx.cat}</span></div>` : ''}
      ${tx.memo ? `<div style="display:flex;justify-content:space-between;"><span style="color:var(--txd)">メモ</span><span>${tx.memo}</span></div>` : ''}
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail()        { document.getElementById('detailOverlay').classList.remove('open'); detailTxId = null; }
function deleteTxFromDetail() { if (detailTxId) { txList = txList.filter(t => t.id !== detailTxId); saveAll(); closeDetail(); renderList(); renderShortageBar(); } }

    const icon = {bank:'🏦',cash:'💴',paypay:'📱',card:'💳',other:'📂'}[ac.type]||'📂';
    item.innerHTML = `
      <span style="font-size:18px">${icon}</span>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700">${ac.name}</div>
        <div style="font-size:11px;color:var(--txd)">
          <select style="font-size:11px;border:none;background:transparent;color:var(--txd);cursor:pointer" onchange="updateType('${ac.id}',this.value)">
            ${['bank','cash','paypay','other'].map(t => `<option value="${t}" ${t===ac.type?'selected':''}>${t}</option>`).join('')}
          </select>
          / 現在: ${fmtMoney(bal)}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
        <div style="font-size:9px;color:var(--txd)">初期残高</div>
        <input type="number" value="${ac.baseBal}" style="width:100px;font-family:var(--mono);font-size:13px;padding:5px 8px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg);color:var(--tx);text-align:right"
          onchange="updateBaseBal('${ac.id}', this.value)">
      </div>
      <button onclick="deleteAccount('${ac.id}')" style="background:none;border:none;color:var(--txm);font-size:14px;cursor:pointer;padding:2px 6px">✕</button>
    `;
    wrap.appendChild(item);
  });
}

function updateType(id, val) {
  const ac = accounts.find(a => a.id === id);
  if (ac) { ac.type = val; saveAll(); renderAccounts(); renderShortageBar(); }
}

function updateBaseBal(id, val) {
  const ac = accounts.find(a => a.id === id);
  if (ac) { ac.baseBal = parseInt(val) || 0; saveAll(); renderShortageBar(); renderAccounts(); }
}

function addAccount() {
  const name = document.getElementById('newAcName').value.trim();
  const type = document.getElementById('newAcType').value;
  const bal  = parseInt(document.getElementById('newAcBal').value) || 0;
  if (!name) { alert('口座名を入力してください'); return; }
  accounts.push({ id: Date.now().toString(), name, type, baseBal: bal });
  saveAll();
  document.getElementById('newAcName').value = '';
  document.getElementById('newAcBal').value  = '';
  renderAccounts();
  renderShortageBar();
}

function deleteAccount(id) {
  accounts = accounts.filter(a => a.id !== id);
  saveAll();
  renderAccounts();
  renderShortageBar();
}

// ─── ユーティリティ ───
function d2s(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtMoney(n)      { const v = Number(n); return '¥' + (isNaN(v) ? '0' : v.toLocaleString()); }
function fmtMoneyShort(n) { return n >= 10000 ? Math.floor(n/1000)+'k' : String(n); }

// ─── Enterキーナビゲーション ───
const INPUT_ORDER = ['inDate','inAmount','inFrom','inTo','inDesc','inCat','inMemo'];
function getVisibleInputs() {
  return INPUT_ORDER.filter(id => {
    const el = document.getElementById(id); if (!el) return false;
    const wrap = el.closest('.fg');
    return !(wrap && wrap.style.display === 'none');
  });
}
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  const active = document.activeElement; if (!active) return;
  const tag = active.tagName.toLowerCase();
  if (tag !== 'input' && tag !== 'select') return;
  const page = document.getElementById('page-input');
  if (!page.classList.contains('active')) return;
  e.preventDefault();
  const visible = getVisibleInputs();
  const idx = visible.indexOf(active.id);
  if (idx === -1) return;
  if (idx < visible.length - 1) {
    const next = document.getElementById(visible[idx+1]);
    if (next) { next.focus(); if (next.tagName.toLowerCase()==='input') next.select(); }
  } else { saveTx(); }
});

// ─── データリセット ───
function hardReset() {
  localStorage.removeItem('kk_accounts');
  localStorage.removeItem('kk_txlist');
  location.reload();
}


// ─── タグ管理 ───
const DEFAULT_TAGS = ['アメックス','コジマ','Amazon','セゾン','イオン','ビックカメラ','ミニオン','Dカード'];
let tagUsage = load('kk_tagUsage', {}); // タグ使用回数

function getTagsSorted() {
  const all = [...new Set([...DEFAULT_TAGS, ...Object.keys(tagUsage)])];
  return all.sort((a, b) => (tagUsage[b] || 0) - (tagUsage[a] || 0));
}

function renderTags() {
  const area = document.getElementById('tagArea');
  if (!area) return;
  area.innerHTML = '';
  getTagsSorted().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn';
    btn.textContent = tag;
    btn.onclick = () => {
      const inp = document.getElementById('inMemo');
      inp.value = tag;
      // 使用回数を上げる
      tagUsage[tag] = (tagUsage[tag] || 0) + 1;
      save('kk_tagUsage', tagUsage);
      renderTags();
    };
    area.appendChild(btn);
  });
}

// ─── 不足アラート計算 ───
function calcAlerts() {
  const alerts = [];
  const today0 = new Date(todayStr);

  // 今後の取引を日付順に走査して、各口座の残高が不足するタイミングを検出
  // 対象：今日以降の全取引（実績・予定問わず）
  const futureTxs = txList
    .filter(tx => tx.date > todayStr)
    .sort((a, b) => a.date.localeCompare(b.date));

  accounts.forEach(ac => {
    let running = calcBal(ac); // 現在残高からスタート
    let lowestDate = null;
    let lowestBal  = running;

    // 日付ごとに残高をシミュレーション
    const dates = [...new Set(futureTxs.map(tx => tx.date))].sort();
    for (const date of dates) {
      const dayTxs = futureTxs.filter(tx => tx.date === date);
      dayTxs.forEach(tx => {
        if (tx.type === 'expense'  && tx.fromAc === ac.id) running -= tx.amount;
        if (tx.type === 'income'   && tx.toAc   === ac.id) running += tx.amount;
        if (tx.type === 'transfer') {
          if (tx.fromAc === ac.id) running -= tx.amount;
          if (tx.toAc   === ac.id) running += tx.amount;
        }
      });
      if (running < lowestBal) {
        lowestBal  = running;
        lowestDate = date;
      }
    }

    if (lowestBal < 0 && lowestDate) {
      const dueDate = new Date(lowestDate);
      const daysLeft = Math.round((dueDate - today0) / 86400000);
      const urgency = daysLeft <= 5 ? 'red' : daysLeft <= 10 ? 'yellow' : null;
      if (urgency) {
        const causeTxs = futureTxs
          .filter(tx => tx.date <= lowestDate)
          .filter(tx => (tx.type === 'expense' || tx.type === 'transfer') && tx.fromAc === ac.id)
          .map(tx => tx.memo || tx.desc)
          .filter(Boolean);
        alerts.push({
          acName:   ac.name,
          date:     lowestDate,
          shortage: -lowestBal,
          daysLeft,
          urgency,
          cause:    [...new Set(causeTxs)].slice(0,3).join('・'),
        });
      }
    }
  });

  return alerts.sort((a, b) => a.daysLeft - b.daysLeft);
}

function renderAlerts() {
  const alerts = calcAlerts();
  const panel  = document.getElementById('alertPanel');
  const body   = document.getElementById('alertBody');
  const count  = document.getElementById('alertCount');

  if (!alerts.length) { panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  count.textContent   = alerts.length + '件';
  count.style.color   = alerts.some(a => a.urgency === 'red') ? 'var(--ac2)' : 'var(--ac4)';
  body.innerHTML      = '';

  alerts.forEach(a => {
    const item = document.createElement('div');
    item.className = 'alert-item ' + a.urgency;
    item.innerHTML = `
      <div class="alert-dot ${a.urgency}"></div>
      <div class="alert-body">
        <div class="alert-name">${a.acName}</div>
        <div class="alert-sub">${a.date}${a.cause ? '　原因: ' + a.cause : ''}</div>
      </div>
      <div class="alert-days ${a.urgency}">あと${a.daysLeft}日</div>
      <div class="alert-amount ${a.urgency}">不足 ${fmtMoney(a.shortage)}</div>
    `;
    body.appendChild(item);
  });
}

function toggleAlertPanel() {
  const body = document.getElementById('alertBody');
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}
